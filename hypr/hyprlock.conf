# Catppuccin Mocha Hyprlock Config

general {
    grace = 3
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 6
    noise = 0.02
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.2
    color = rgb(1e1e2e)
}

# Time
label {
    monitor =
    text = $TIME
    color = rgb(cdd6f4)
    font_size = 90
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
    shadow_passes = 2
    shadow_size = 3
    shadow_color = rgb(1e1e2e)
}

# Date
label {
    monitor =
    text = cmd[update:3600000] date +"%A, %d %B %Y"
    color = rgb(bac2de)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Hi, $USER
    color = rgb(a6e3a1)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -40
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb(45475a)
    inner_color = rgb(313244)
    font_color = rgb(cdd6f4)
    fade_on_empty = true
    fade_timeout = 1000
    placeholder_text = <span foreground="##a6adc8">  Enter Password...</span>
    hide_input = false
    check_color = rgb(a6e3a1)
    fail_color = rgb(f38ba8)
    fail_text = <span foreground="##f38ba8">$FAIL <b>($ATTEMPTS)</b></span>
    capslock_color = rgb(f9e2af)
    position = 0, -120
    halign = center
    valign = center
    rounding = 12
}
