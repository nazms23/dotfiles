################
### CATPPUCCIN ###
################

source = ~/.config/hypr/catppuccin-mocha.conf


################
### MONITORS ###
################

# HDMI monitor solda, laptop sağda
monitor = HDMI-A-1, 1920x1080@60, 0x0, 1
monitor = eDP-1, 1920x1080@144, 1920x0, 1


###################
### MY PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun -show-icons


#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = swaync
exec-once = awww-daemon && awww img ~/wallpaper.png --transition-type grow --transition-duration 1
exec-once = hypridle
exec-once = hyprswitch init --show-title --custom-css ~/.config/hypr/hyprswitch.css &
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = kando
exec-once = hyprpm reload
exec-once = eww daemon
exec-once = swayosd-server


#############################
### ENVIRONMENT VARIABLES ###
#############################

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,catppuccin-mocha-green-cursors
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,catppuccin-mocha-green-cursors

# Qt theming (Kvantum + Catppuccin)
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,kvantum
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1

# Electron Wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland

# GTK Catppuccin tema
env = GTK_THEME,catppuccin-mocha-green-standard+default


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 14

    border_size = 2

    col.active_border = $green $teal 45deg
    col.inactive_border = $surface0

    resize_on_border = true
    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 0.92

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1e1e2eee)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        vibrancy = 0.2
    }
}

animations {
    enabled = yes, please :)

    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.05, 0.9, 0.1, 1.05
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear, 0, 0, 1, 1
    bezier = almostLinear, 0.5, 0.5, 0.75, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, overshot, popin 80%
    animation = windowsIn, 1, 4.1, overshot, popin 80%
    animation = windowsOut, 1, 1.49, smoothOut, popin 80%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 4, overshot, slide
    animation = workspacesIn, 1, 4, overshot, slide
    animation = workspacesOut, 1, 4, overshot, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

plugin {
    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(1e1e2e)
        workspace_method = center current
        enable_gesture = true
    }
}


#############
### INPUT ###
#############

input {
    kb_layout = tr,us
    kb_variant =
    kb_model =
    kb_options = grp:alt_shift_toggle
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = false
    }
}

gesture = 3, horizontal, workspace

device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

# Core
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, wlogout -b 5 -T 400 -B 400 --protocol layer-shell
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, R, exec, $menu
bind = $mainMod, F, fullscreen,
bind = $mainMod, T, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, layoutmsg, togglesplit

# Keybindings help
bind = $mainMod, H, exec, ~/.config/hypr/keybinds-help.sh

# Wallpaper picker
bind = $mainMod, W, exec, waypaper --backend awww --folder ~/Wallpapers

# Alt-Tab style window switcher (hyprswitch)
bind = ALT, TAB, exec, hyprswitch gui --mod-key alt --key tab --close mod-key-release --reverse-key=mod=shift --sort-recent true

# Lock screen
bind = $mainMod, L, exec, hyprlock

# Clipboard manager
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy

# Notification center
bind = $mainMod, N, exec, swaync-client -t -sw

# Kando pie menu
bind = $mainMod, D, exec, kando --trigger "example-menu"

# WiFi manager
bind = $mainMod, F11, exec, networkmanager_dmenu

# EWW masaustu widget toggle
bind = $mainMod, G, exec, eww open --toggle desktop-widget

# Hyprexpo — workspace overview
bind = $mainMod, A, hyprexpo:expo, toggle

# Screenshots
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp -d)" - | wl-copy
bind = , Print, exec, grim ~/Screenshots/$(date +%Y%m%d_%H%M%S).png

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Sıradaki/önceki workspace
bind = $mainMod, Tab, workspace, +1
bind = $mainMod SHIFT, Tab, workspace, -1

# Mouse workspace scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Resize with keyboard
binde = $mainMod CTRL, left, resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up, resizeactive, 0 -40
binde = $mainMod CTRL, down, resizeactive, 0 40

# Mouse emulation with keyboard (SUPER+ALT + hjkl = move, u = left click, y = right click)
binde = $mainMod ALT, h, exec, ydotool mousemove -x -8 -y 0
binde = $mainMod ALT, l, exec, ydotool mousemove -x 8 -y 0
binde = $mainMod ALT, k, exec, ydotool mousemove -x 0 -y -8
binde = $mainMod ALT, j, exec, ydotool mousemove -x 0 -y 8
bind = $mainMod ALT, u, exec, ydotool click 0xC0
bind = $mainMod ALT, y, exec, ydotool click 0xC1

# Media keys
bindle = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise --max-volume 150
bindle = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bindl = , XF86AudioMicMute, exec, swayosd-client --input-volume mute-toggle
bindle = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise
bindle = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , Caps_Lock, exec, sleep 0.1 && ~/.config/hypr/lockkey-osd.sh caps
bindl = , Num_Lock, exec, sleep 0.1 && ~/.config/hypr/lockkey-osd.sh num
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = suppress-maximize-events
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

# Yad help dialog float
windowrule {
    name = yad-float
    match:class = ^(yad)$
    float = yes
    center = true
}

# Rofi float
windowrule {
    name = rofi-float
    match:class = ^(Rofi)$
    float = yes
}


# System monitor float
windowrule {
    name = sysmonitor-float
    match:class = ^(sysmonitor)$
    float = yes
    size = 60% 70%
    center = true
}

# pavucontrol float
windowrule {
    name = pavucontrol-float
    match:class = ^(org.pulseaudio.pavucontrol)$
    float = yes
    size = 40% 50%
    center = true
}

# Picture-in-Picture
windowrule {
    name = pip-float
    match:title = ^(Picture-in-Picture)$
    float = yes
    pin = yes
    size = 30% 30%
    move = 68% 67%
}

# Kando pie menu
windowrule {
    name = kando-menu
    match:class = ^(kando)$
    float = yes
    pin = yes
    decorate = no
    animation = none
}

# EWW popups
windowrule {
    name = eww-popups
    match:class = ^(eww)$
    float = yes
    pin = yes
    decorate = no
}
